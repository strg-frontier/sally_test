<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cafe Sally</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Playfair+Display&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <h1>Cafe Sally</h1>
    <p>西洋風・くつろぎカフェ</p>
  </header>
  <div class="hero">
    <img src="images/sally01.jpg" alt="ラテアート">
  </div>
  <nav>
    <a href="#concept">CONCEPT</a>
    <a href="#menu">MENU</a>
    <a href="#info">店舗情報</a>
    <a href="#contact">CONTACT</a>
  </nav>
  <section id="concept">
    <h2>CONCEPT</h2>
    <p>西洋のエレガントなくつろぎ空間で、おいしいひとときを。</p>
    <img src="images/sally02.jpg" alt="店内写真">
  </section>
  <section id="menu">
    <h2>MENU</h2>
    <div class="menu-item">
      <img src="placeholder-coffee.jpg" alt="ハンドドリップコーヒー">
      <div class="text">
        <h3>ハンドドリップコーヒー</h3>
        <p>こだわり豆の香り高い一杯。¥600</p>
      </div>
    </div>
    <div class="menu-item">
      <img src="placeholder-cake.jpg" alt="自家製ケーキ">
      <div class="text">
        <h3>自家製ケーキ</h3>
        <p>季節の果実を使用。¥500〜</p>
      </div>
    </div>
  </section>
  <section id="info">
    <h2>店舗情報</h2>
    <p>営業時間：11:00〜17:00</p>
    <p>定休日：毎週水・木</p>
    <p>アクセス：〇〇駅から徒歩〇分</p>
    <div class="map">
    <iframe 
      src="https://www.google.com/maps?q=35.5865290,139.6271160&z=15&output=embed"
      width="100%" 
      height="300" 
      style="border:0;" 
      allowfullscreen="" 
      loading="lazy" 
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
    </div>
  </section>
  <section id="contact">
    <h2>CONTACT</h2>
    <p>予約・お問い合わせはこちら</p>
    <a href="mailto:info@cafesally.jp" class="btn">メールする</a>
  </section>
  <footer>
    <p>&copy; 2025 Cafe Sally</p>
  </footer>
</body>
</html>
